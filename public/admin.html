<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Skin Analyser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <style>
        body{font-family:'Inter',sans-serif}
        .gradient-bg{background:linear-gradient(135deg,#fdf2f8 0%,#fce7f3 25%,#fff1f2 50%,#f0fdf4 75%,#fdf2f8 100%)}
        .glass-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5)}
        .tab-btn.active{background:linear-gradient(to right,#f43f5e,#ec4899);color:white;box-shadow:0 4px 12px rgba(244,63,94,0.2)}
        .modal-overlay{background:rgba(0,0,0,0.4);backdrop-filter:blur(4px)}
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <nav class="glass-card sticky top-0 z-50 border-b border-white/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-rose-400 to-pink-500 rounded-xl flex items-center justify-center shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    </div>
                    <span class="font-serif text-xl font-bold text-gray-800">Admin Panel</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="/" class="text-gray-600 hover:text-rose-500 font-medium text-sm">Home</a>
                    <a href="/dashboard" class="text-gray-600 hover:text-rose-500 font-medium text-sm">Dashboard</a>
                    <a href="/logout" class="text-sm text-gray-500 hover:text-rose-500">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Tabs -->
        <div class="flex flex-wrap gap-2 mb-6" id="tabBar">
            <button class="tab-btn active px-4 py-2 rounded-xl text-sm font-medium transition-all" data-tab="dashboard">Dashboard</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="users">Users</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="products">Products</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="ingredients">Ingredients</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="reviews">Reviews</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="recommendations">Recs</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="reports">Reports</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="export">Export</button>
            <button class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-tab="settings">Settings</button>
        </div>

        <div id="tabContent"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div class="glass-card rounded-2xl p-6 shadow-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto m-4">
            <div class="flex items-center justify-between mb-4">
                <h3 id="modalTitle" class="font-serif text-lg font-bold text-gray-800"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
    const API = '/api/admin';
    let currentTab = 'dashboard';

    // ─── Tab switching ──────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-gray-600');
            });
            btn.classList.add('active');
            btn.classList.remove('text-gray-600');
            loadTab(currentTab);
        });
    });

    // ─── Modal helpers ──────────────────────────────────────────────────────────
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function showModal(title, html) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    }

    // ─── Toast notifications ────────────────────────────────────────────────────
    function showToast(message, type = 'success') {
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'fixed bottom-4 right-4 z-[9999] flex flex-col gap-2';
            document.body.appendChild(container);
        }
        const toast = document.createElement('div');
        toast.className = `px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-all transform translate-y-0 ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ─── API fetch wrapper (always sends session cookie) ───────────────────────
    async function api(url, opts) {
        opts = Object.assign({ credentials: 'same-origin' }, opts || {});
        try {
            const res = await fetch(url, opts);
            // If server redirected to login (HTML response), treat as auth error
            const ct = res.headers.get('content-type') || '';
            if (!ct.includes('application/json')) {
                if (res.status === 401 || res.redirected) {
                    showToast('Session expired. Redirecting to login…', 'error');
                    setTimeout(() => window.location.href = '/login', 1500);
                }
                return { success: false, message: 'Unexpected server response' };
            }
            return await res.json();
        } catch (err) {
            console.error('API error:', err);
            showToast('Network error – check your connection', 'error');
            return { success: false, message: 'Network error' };
        }
    }

    // ─── Stat card ──────────────────────────────────────────────────────────────
    function statCard(label, value, icon, color) {
        return `<div class="glass-card rounded-2xl p-5 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-${color}-50 rounded-xl flex items-center justify-center text-lg">${icon}</div>
                <div><p class="text-2xl font-bold text-gray-800">${value}</p><p class="text-xs text-gray-500">${label}</p></div>
            </div>
        </div>`;
    }

    // ─── Loading / error helpers ─────────────────────────────────────────────────
    function showLoading() {
        document.getElementById('tabContent').innerHTML = `<div class="flex items-center justify-center py-16 text-gray-400 text-sm">Loading…</div>`;
    }
    function showError(msg) {
        document.getElementById('tabContent').innerHTML = `<div class="glass-card rounded-2xl p-6 shadow-md text-center text-red-500">${msg}</div>`;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // DASHBOARD
    // ─────────────────────────────────────────────────────────────────────────────
    async function loadDashboard() {
        showLoading();
        const d = await api(`${API}/dashboard`);
        if (!d.success) { showError('Failed to load dashboard'); return; }
        const s = d.stats;
        // Note: productsPerCategory, usersPerSkinType etc. are top-level on d, NOT inside d.stats
        document.getElementById('tabContent').innerHTML = `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                ${statCard('Total Users',    s.totalUsers,    '👥', 'blue')}
                ${statCard('Total Products', s.totalProducts, '🧴', 'pink')}
                ${statCard('Total Reviews',  s.totalReviews,  '⭐', 'yellow')}
                ${statCard('Avg Rating', parseFloat(s.avgRating || 0).toFixed(1), '📊', 'green')}
                ${statCard('Risky Products', s.riskyProductCount, '⚠️', 'red')}
                ${statCard('Deleted (audit)', s.deletedProductCount, '🗑️', 'gray')}
                ${statCard('Total Ingredients', s.totalIngredients, '🧪', 'purple')}
            </div>
            <div class="grid lg:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">📦 Products per Category</h3>
                    <div class="space-y-2">${(d.productsPerCategory || []).map(c => `
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-600">${c.category}</span>
                            <div class="flex items-center gap-2">
                                <div class="h-2 bg-rose-400 rounded-full" style="width:${Math.min(c.count * 12, 120)}px"></div>
                                <span class="text-sm font-medium w-6 text-right">${c.count}</span>
                            </div>
                        </div>`).join('')}</div>
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">🧴 Users per Skin Type</h3>
                    <div class="space-y-2">${(d.usersPerSkinType || []).map(t => `
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-600">${t.skin_type_name}</span>
                            <div class="flex items-center gap-2">
                                <div class="h-2 bg-blue-400 rounded-full" style="width:${Math.min(t.count * 12, 120)}px"></div>
                                <span class="text-sm font-medium w-6 text-right">${t.count}</span>
                            </div>
                        </div>`).join('')}</div>
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">💬 Most Reviewed</h3>
                    <div class="space-y-2">${(d.mostReviewed || []).map(p => `
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-600 truncate max-w-[200px]">${p.product_name}</span>
                            <span class="text-sm font-medium text-rose-500 whitespace-nowrap">${p.review_count} reviews</span>
                        </div>`).join('')}</div>
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">⭐ Top Rated</h3>
                    <div class="space-y-2">${(d.topRated || []).map(p => `
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-600 truncate max-w-[200px]">${p.product_name}</span>
                            <span class="text-sm font-medium text-yellow-500 whitespace-nowrap">★ ${parseFloat(p.avg_rating).toFixed(1)}</span>
                        </div>`).join('')}</div>
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">💰 Price by Category</h3>
                    <div class="space-y-2">${(d.maxPricePerCategory || []).map(c => `
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-600">${c.category}</span>
                            <span class="text-gray-800 font-medium">$${parseFloat(c.min_price).toFixed(0)}–$${parseFloat(c.max_price).toFixed(0)} <span class="text-gray-400">(avg $${parseFloat(c.avg_price).toFixed(0)})</span></span>
                        </div>`).join('')}</div>
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h3 class="font-semibold text-gray-800 mb-3">🕑 Recent Reviews</h3>
                    <div class="space-y-2">${(d.recentReviews || []).map(r => `
                        <div class="flex items-start justify-between gap-2">
                            <div>
                                <p class="text-xs font-medium text-gray-700">${r.user_name} on <em>${r.product_name}</em></p>
                                <p class="text-xs text-gray-500 truncate max-w-[220px]">${r.comment || '–'}</p>
                            </div>
                            <span class="text-yellow-500 text-xs whitespace-nowrap">${'★'.repeat(r.rating)}</span>
                        </div>`).join('')}</div>
                </div>
            </div>`;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // USERS
    // ─────────────────────────────────────────────────────────────────────────────
    function renderUsersTable(users, total) {
        return `
        <div class="glass-card rounded-2xl p-6 shadow-md">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-serif text-xl font-bold text-gray-800">Users (${total})</h2>
                <input type="text" placeholder="Search users…" id="userSearch"
                    class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none w-48">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr class="border-b border-gray-200 text-left">
                        <th class="pb-2 text-gray-500 font-medium">ID</th>
                        <th class="pb-2 text-gray-500 font-medium">Name</th>
                        <th class="pb-2 text-gray-500 font-medium">Email</th>
                        <th class="pb-2 text-gray-500 font-medium">Age</th>
                        <th class="pb-2 text-gray-500 font-medium">Skin Type</th>
                        <th class="pb-2 text-gray-500 font-medium">Role</th>
                        <th class="pb-2 text-gray-500 font-medium">Actions</th>
                    </tr></thead>
                    <tbody>${users.map(u => `
                        <tr class="border-b border-gray-100 hover:bg-gray-50">
                            <td class="py-2 text-gray-400">${u.user_id}</td>
                            <td class="py-2 font-medium">${escHtml(u.name)}</td>
                            <td class="py-2 text-gray-500">${escHtml(u.email)}</td>
                            <td class="py-2">${u.age}</td>
                            <td class="py-2 text-gray-500">${u.skin_type_name || '–'}</td>
                            <td class="py-2">
                                <span class="px-2 py-0.5 rounded text-xs font-medium
                                    ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}">
                                    ${u.role}
                                </span>
                            </td>
                            <td class="py-2 flex gap-2">
                                <button onclick="editUser(${u.user_id})" class="text-blue-500 hover:text-blue-700 text-xs font-medium">Edit</button>
                                <button onclick="deleteUser(${u.user_id})" class="text-red-500 hover:text-red-700 text-xs font-medium">Delete</button>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
    }

    async function loadUsers(search = '') {
        showLoading();
        const url = search ? `${API}/users?search=${encodeURIComponent(search)}` : `${API}/users`;
        const d = await api(url);
        if (!d.success) { showError('Failed to load users'); return; }
        const total = (d.pagination && d.pagination.total) || 0;
        document.getElementById('tabContent').innerHTML = renderUsersTable(d.users, total);
        // Wire search box without losing current value
        const box = document.getElementById('userSearch');
        if (box) {
            box.value = search;
            let timer;
            box.addEventListener('input', e => {
                clearTimeout(timer);
                timer = setTimeout(() => loadUsers(e.target.value.trim()), 350);
            });
        }
    }

    async function editUser(id) {
        const d = await api(`${API}/users/${id}`);
        if (!d.success) { showToast('Could not load user', 'error'); return; }
        const u = d.user;
        showModal('Edit User', `
            <form id="editUserForm" class="space-y-3">
                <div>
                    <label class="text-sm text-gray-600">Name</label>
                    <input name="name" value="${escHtml(u.name)}" required
                        class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-600">Email</label>
                    <input name="email" type="email" value="${escHtml(u.email)}" required
                        class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-sm text-gray-600">Age</label>
                        <input name="age" type="number" min="18" value="${u.age}"
                            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Gender</label>
                        <select name="gender" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                            ${['Male','Female','Other'].map(g => `<option ${u.gender===g?'selected':''}>${g}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600">Role</label>
                    <select name="role" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                        <option ${u.role==='user'?'selected':''}>user</option>
                        <option ${u.role==='admin'?'selected':''}>admin</option>
                    </select>
                </div>
                <p id="editUserMsg" class="text-sm hidden"></p>
                <button type="submit" class="w-full py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-medium rounded-xl text-sm">Save Changes</button>
            </form>`);
        document.getElementById('editUserForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Saving…';
            const body = Object.fromEntries(new FormData(e.target));
            const r = await api(`${API}/users/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (r.success) { showToast('User updated'); closeModal(); loadUsers(); }
            else { showToast(r.message || 'Update failed', 'error'); btn.disabled = false; btn.textContent = 'Save Changes'; }
        });
    }

    async function deleteUser(id) {
        if (!confirm('Permanently delete this user?')) return;
        const r = await api(`${API}/users/${id}`, { method: 'DELETE' });
        if (r.success) { showToast('User deleted'); loadUsers(); }
        else showToast(r.message || 'Delete failed', 'error');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // PRODUCTS
    // ─────────────────────────────────────────────────────────────────────────────
    async function loadProducts(search = '', category = '') {
        showLoading();
        let qs = [];
        if (search)   qs.push(`search=${encodeURIComponent(search)}`);
        if (category) qs.push(`category=${encodeURIComponent(category)}`);
        const d = await api(`${API}/products${qs.length ? '?' + qs.join('&') : ''}`);
        if (!d.success) { showError('Failed to load products'); return; }
        const total = (d.pagination && d.pagination.total) || 0;
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md">
                <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                    <h2 class="font-serif text-xl font-bold text-gray-800">Products (${total})</h2>
                    <div class="flex gap-2 flex-wrap">
                        <input type="text" id="productSearch" value="${escHtml(search)}" placeholder="Search…"
                            class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none w-40">
                        <select id="productCategoryFilter" class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none">
                            <option value="">All Categories</option>
                            ${['Cleanser','Moisturizer','Sunscreen','Serum','Toner'].map(c =>
                                `<option ${category===c?'selected':''}>${c}</option>`).join('')}
                        </select>
                        <button onclick="addProduct()" class="px-4 py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white text-sm font-medium rounded-xl shadow-md">+ Add</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="border-b border-gray-200 text-left">
                            <th class="pb-2 text-gray-500 font-medium">ID</th>
                            <th class="pb-2 text-gray-500 font-medium">Name</th>
                            <th class="pb-2 text-gray-500 font-medium">Brand</th>
                            <th class="pb-2 text-gray-500 font-medium">Category</th>
                            <th class="pb-2 text-gray-500 font-medium">Price</th>
                            <th class="pb-2 text-gray-500 font-medium">Rating</th>
                            <th class="pb-2 text-gray-500 font-medium">Actions</th>
                        </tr></thead>
                        <tbody>${d.products.map(p => `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-2 text-gray-400">${p.product_id}</td>
                                <td class="py-2 font-medium">${escHtml(p.product_name)}</td>
                                <td class="py-2 text-gray-500">${escHtml(p.brand)}</td>
                                <td class="py-2"><span class="px-2 py-0.5 bg-rose-50 text-rose-600 rounded text-xs">${p.category}</span></td>
                                <td class="py-2">$${parseFloat(p.price).toFixed(2)}</td>
                                <td class="py-2 text-yellow-500">${p.avg_rating ? '★ ' + parseFloat(p.avg_rating).toFixed(1) : '–'}</td>
                                <td class="py-2 flex gap-2">
                                    <button onclick="editProduct(${p.product_id})" class="text-blue-500 hover:text-blue-700 text-xs font-medium">Edit</button>
                                    <button onclick="deleteProduct(${p.product_id})" class="text-red-500 hover:text-red-700 text-xs font-medium">Delete</button>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        let timer;
        document.getElementById('productSearch').addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                loadProducts(e.target.value.trim(), document.getElementById('productCategoryFilter').value);
            }, 350);
        });
        document.getElementById('productCategoryFilter').addEventListener('change', e => {
            loadProducts(document.getElementById('productSearch').value.trim(), e.target.value);
        });
    }

    function productFormHtml(p = {}) {
        const expiry = p.expiry_date ? String(p.expiry_date).split('T')[0] : '';
        return `
        <form id="productForm" class="space-y-3">
            <div><label class="text-sm text-gray-600">Product Name *</label>
                <input name="product_name" value="${escHtml(p.product_name||'')}" required
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1"></div>
            <div><label class="text-sm text-gray-600">Brand *</label>
                <input name="brand" value="${escHtml(p.brand||'')}" required
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1"></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-sm text-gray-600">Category *</label>
                    <select name="category" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                        ${['Cleanser','Moisturizer','Sunscreen','Serum','Toner'].map(c =>
                            `<option ${p.category===c?'selected':''}>${c}</option>`).join('')}
                    </select></div>
                <div><label class="text-sm text-gray-600">Price *</label>
                    <input name="price" type="number" step="0.01" min="0.01" value="${p.price||''}" required
                        class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1"></div>
            </div>
            <div><label class="text-sm text-gray-600">Description</label>
                <textarea name="description" rows="2"
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">${escHtml(p.description||'')}</textarea></div>
            <div><label class="text-sm text-gray-600">Expiry Date *</label>
                <input name="expiry_date" type="date" value="${expiry}" required
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1"></div>
            <p id="productFormMsg" class="text-sm hidden"></p>
            <button type="submit" class="w-full py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-medium rounded-xl text-sm">Save</button>
        </form>`;

    async function addProduct() {
        showModal('Add Product', productFormHtml());
        document.getElementById('productForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Saving…';
            const body = Object.fromEntries(new FormData(e.target));
            const r = await api(`${API}/products`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            if (r.success) { showToast('Product added'); closeModal(); loadProducts(); }
            else {
                const msg = document.getElementById('productFormMsg');
                msg.textContent = r.message || 'Failed to add product';
                msg.className = 'text-sm text-red-500';
                btn.disabled = false; btn.textContent = 'Save';
            }
        });

    async function editProduct(id) {
        const d = await api(`${API}/products/${id}`);
        if (!d.success) { showToast('Could not load product', 'error'); return; }
        showModal('Edit Product', productFormHtml(d.product));
        document.getElementById('productForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Saving…';
            const body = Object.fromEntries(new FormData(e.target));
            const r = await api(`${API}/products/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            if (r.success) { showToast('Product updated'); closeModal(); loadProducts(); }
            else {
                const msg = document.getElementById('productFormMsg');
                msg.textContent = r.message || 'Update failed';
                msg.className = 'text-sm text-red-500';
                btn.disabled = false; btn.textContent = 'Save';

    async function deleteProduct(id) {
        if (!confirm('Delete this product? It will be archived in the audit log.')) return;
        const r = await api(`${API}/products/${id}`, { method: 'DELETE' });
        if (r.success) { showToast('Product deleted (audit logged)'); loadProducts(); }
        else showToast(r.message || 'Delete failed', 'error');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // INGREDIENTS
    // ─────────────────────────────────────────────────────────────────────────────
    // DB enum values: 'Safe' | 'Moderate' | 'High Risk'
    const SAFETY_LEVELS = ['Safe', 'Moderate', 'High Risk'];

    function safetyBadge(level) {
        const cls = level === 'Safe' ? 'bg-green-100 text-green-700'
                  : level === 'Moderate' ? 'bg-yellow-100 text-yellow-700'
                  : 'bg-red-100 text-red-700';
        return `<span class="px-2 py-0.5 rounded text-xs font-medium ${cls}">${level}</span>`;
    }

    async function loadIngredients(search = '', safety_level = '') {
        showLoading();
        let qs = [];
        if (search)       qs.push(`search=${encodeURIComponent(search)}`);
        if (safety_level) qs.push(`safety_level=${encodeURIComponent(safety_level)}`);
        const d = await api(`${API}/ingredients${qs.length ? '?' + qs.join('&') : ''}`);
        if (!d.success) { showError('Failed to load ingredients'); return; }
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md">
                <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                    <h2 class="font-serif text-xl font-bold text-gray-800">Ingredients (${d.ingredients.length})</h2>
                    <div class="flex gap-2 flex-wrap">
                        <input type="text" id="ingSearch" value="${escHtml(search)}" placeholder="Search…"
                            class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none w-40">
                        <select id="ingSafetyFilter" class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none">
                            <option value="">All Levels</option>
                            ${SAFETY_LEVELS.map(s => `<option ${safety_level===s?'selected':''}>${s}</option>`).join('')}
                        </select>
                        <button onclick="addIngredient()" class="px-4 py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white text-sm font-medium rounded-xl shadow-md">+ Add</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="border-b border-gray-200 text-left">
                            <th class="pb-2 text-gray-500 font-medium">ID</th>
                            <th class="pb-2 text-gray-500 font-medium">Name</th>
                            <th class="pb-2 text-gray-500 font-medium">Safety</th>
                            <th class="pb-2 text-gray-500 font-medium">Description / Side Effects</th>
                            <th class="pb-2 text-gray-500 font-medium">Products</th>
                            <th class="pb-2 text-gray-500 font-medium">Actions</th>
                        </tr></thead>
                        <tbody>${d.ingredients.map(i => `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-2 text-gray-400">${i.ingredient_id}</td>
                                <td class="py-2 font-medium">${escHtml(i.ingredient_name)}</td>
                                <td class="py-2">${safetyBadge(i.safety_level)}</td>
                                <td class="py-2 text-gray-500 truncate max-w-[200px]">${escHtml(i.description||'–')}</td>
                                <td class="py-2 text-center">${i.product_count}</td>
                                <td class="py-2 flex gap-2">
                                    <button onclick="editIngredient(${i.ingredient_id})" class="text-blue-500 text-xs font-medium">Edit</button>
                                    <button onclick="deleteIngredient(${i.ingredient_id})" class="text-red-500 text-xs font-medium">Delete</button>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        let timer;
        document.getElementById('ingSearch').addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => loadIngredients(e.target.value.trim(), document.getElementById('ingSafetyFilter').value), 350);
        });
        document.getElementById('ingSafetyFilter').addEventListener('change', e => {
            loadIngredients(document.getElementById('ingSearch').value.trim(), e.target.value);
        });
    }

    function ingredientFormHtml(i = {}) {
        return `<form id="ingForm" class="space-y-3">
            <div><label class="text-sm text-gray-600">Ingredient Name *</label>
                <input name="ingredient_name" value="${escHtml(i.ingredient_name||'')}" required
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1"></div>
            <div><label class="text-sm text-gray-600">Safety Level *</label>
                <select name="safety_level" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                    ${SAFETY_LEVELS.map(s => `<option ${i.safety_level===s?'selected':''}>${s}</option>`).join('')}
                </select></div>
            <div><label class="text-sm text-gray-600">Description / Side Effects</label>
                <textarea name="description" rows="3"
                    class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">${escHtml(i.description||'')}</textarea></div>
            <p id="ingFormMsg" class="text-sm hidden"></p>
            <button type="submit" class="w-full py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-medium rounded-xl text-sm">Save</button>
        </form>`;
    }

    async function addIngredient() {
        showModal('Add Ingredient', ingredientFormHtml());

            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Saving…';
            const body = Object.fromEntries(new FormData(e.target));
            const r = await api(`${API}/ingredients`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            if (r.success) { showToast('Ingredient added'); closeModal(); loadIngredients(); }
            else {
                const msg = document.getElementById('ingFormMsg');
                msg.textContent = r.message || 'Failed'; msg.className = 'text-sm text-red-500';
                btn.disabled = false; btn.textContent = 'Save';
            }
        });

    async function editIngredient(id) {
        const d = await api(`${API}/ingredients/${id}`);
        if (!d.success) { showToast('Could not load ingredient', 'error'); return; }
        showModal('Edit Ingredient', ingredientFormHtml(d.ingredient));
        document.getElementById('ingForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Saving…';
            const body = Object.fromEntries(new FormData(e.target));
            const r = await api(`${API}/ingredients/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            if (r.success) { showToast('Ingredient updated'); closeModal(); loadIngredients(); }
            else {
                const msg = document.getElementById('ingFormMsg');
                msg.textContent = r.message || 'Update failed'; msg.className = 'text-sm text-red-500';
                btn.disabled = false; btn.textContent = 'Save';
            }
        });

    async function deleteIngredient(id) {
        if (!confirm('Delete this ingredient?')) return;
        const r = await api(`${API}/ingredients/${id}`, { method: 'DELETE' });
        if (r.success) { showToast('Ingredient deleted'); loadIngredients(); }
        else showToast(r.message || 'Delete failed', 'error');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // REVIEWS
    // ─────────────────────────────────────────────────────────────────────────────
    async function loadReviews() {
        showLoading();
        const d = await api(`${API}/reviews`);
        if (!d.success) { showError('Failed to load reviews'); return; }
        const total = (d.pagination && d.pagination.total) || 0;
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md">
                <h2 class="font-serif text-xl font-bold text-gray-800 mb-4">Reviews (${total})</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="border-b border-gray-200 text-left">
                            <th class="pb-2 text-gray-500 font-medium">ID</th>
                            <th class="pb-2 text-gray-500 font-medium">User</th>
                            <th class="pb-2 text-gray-500 font-medium">Product</th>
                            <th class="pb-2 text-gray-500 font-medium">Rating</th>
                            <th class="pb-2 text-gray-500 font-medium">Comment</th>
                            <th class="pb-2 text-gray-500 font-medium">Date</th>
                            <th class="pb-2 text-gray-500 font-medium">Actions</th>
                        </tr></thead>
                        <tbody>${d.reviews.map(r => `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-2 text-gray-400">${r.review_id}</td>
                                <td class="py-2">${escHtml(r.user_name||String(r.user_id))}</td>
                                <td class="py-2">${escHtml(r.product_name||String(r.product_id))}</td>
                                <td class="py-2 text-yellow-500">${'★'.repeat(r.rating)}</td>
                                <td class="py-2 text-gray-500 truncate max-w-[200px]">${escHtml(r.comment||'–')}</td>
                                <td class="py-2 text-gray-400 text-xs">${new Date(r.review_date).toLocaleDateString()}</td>
                                <td class="py-2">
                                    <button onclick="deleteReview(${r.review_id})" class="text-red-500 text-xs font-medium">Delete</button>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
    }

    async function deleteReview(id) {
        if (!confirm('Delete this review?')) return;
        const r = await api(`${API}/reviews/${id}`, { method: 'DELETE' });
        if (r.success) { showToast('Review deleted'); loadReviews(); }
        else showToast(r.message || 'Delete failed', 'error');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // RECOMMENDATIONS
    // ─────────────────────────────────────────────────────────────────────────────
    async function loadRecommendations() {
        showLoading();
        const d = await api(`${API}/recommendations`);
        if (!d.success) { showError('Failed to load recommendations'); return; }
        const total = (d.pagination && d.pagination.total) || 0;
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md">
                <h2 class="font-serif text-xl font-bold text-gray-800 mb-4">Recommendations (${total})</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="border-b border-gray-200 text-left">
                            <th class="pb-2 text-gray-500 font-medium">ID</th>
                            <th class="pb-2 text-gray-500 font-medium">User</th>
                            <th class="pb-2 text-gray-500 font-medium">Product</th>
                            <th class="pb-2 text-gray-500 font-medium">Skin Issue / Reason</th>
                            <th class="pb-2 text-gray-500 font-medium">Date</th>
                            <th class="pb-2 text-gray-500 font-medium">Actions</th>
                        </tr></thead>
                        <tbody>${d.recommendations.map(r => `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-2 text-gray-400">${r.recommendation_id}</td>
                                <td class="py-2">${escHtml(r.user_name||String(r.user_id))}</td>
                                <td class="py-2">${escHtml(r.product_name||String(r.product_id))}</td>
                                <td class="py-2 text-gray-500 truncate max-w-[200px]">${escHtml(r.reason||'–')}</td>
                                <td class="py-2 text-gray-400 text-xs">${r.recommended_at ? new Date(r.recommended_at).toLocaleDateString() : '–'}</td>
                                <td class="py-2">
                                    <button onclick="deleteRec(${r.recommendation_id})" class="text-red-500 text-xs font-medium">Delete</button>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
    }

    async function deleteRec(id) {
        if (!confirm('Delete this recommendation?')) return;
        const r = await api(`${API}/recommendations/${id}`, { method: 'DELETE' });
        if (r.success) { showToast('Recommendation deleted'); loadRecommendations(); }
        else showToast(r.message || 'Delete failed', 'error');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // REPORTS
    // ─────────────────────────────────────────────────────────────────────────────
    async function loadReports() {
        showLoading();
        const [risky, audit] = await Promise.all([
            api(`${API}/reports/risky-ingredients`),
            api(`${API}/reports/audit-log`)
        ]);
        document.getElementById('tabContent').innerHTML = `
            <div class="grid lg:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h2 class="font-serif text-lg font-bold text-gray-800 mb-4">⚠️ High Risk Ingredients in Products</h2>
                    ${risky.success && risky.data && risky.data.length
                        ? `<div class="space-y-2">${risky.data.map(r => `
                            <div class="p-3 bg-red-50 rounded-xl">
                                <p class="font-medium text-red-700 text-sm">${escHtml(r.ingredient_name)}</p>
                                <p class="text-xs text-gray-500">in <em>${escHtml(r.product_name)}</em> by ${escHtml(r.brand)}</p>
                                <p class="text-xs text-red-400 mt-0.5">${escHtml(r.ingredient_description||'No description')}</p>
                            </div>`).join('')}</div>`
                        : '<p class="text-gray-400 text-sm">No high-risk ingredients found</p>'}
                </div>
                <div class="glass-card rounded-2xl p-6 shadow-md">
                    <h2 class="font-serif text-lg font-bold text-gray-800 mb-4">🗑️ Deleted Products Audit Log</h2>
                    ${audit.success && audit.data && audit.data.length
                        ? `<div class="space-y-2">${audit.data.map(a => `
                            <div class="p-3 bg-gray-50 rounded-xl">
                                <p class="font-medium text-gray-700 text-sm">${escHtml(a.product_name)} <span class="text-gray-400">by</span> ${escHtml(a.brand)}</p>
                                <p class="text-xs text-gray-500">${a.category} · $${parseFloat(a.price).toFixed(2)}</p>
                                <p class="text-xs text-gray-400">Deleted: ${new Date(a.deleted_at).toLocaleString()}</p>
                            </div>`).join('')}</div>`
                        : '<p class="text-gray-400 text-sm">No deleted products on record</p>'}
                </div>
            </div>`;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // EXPORT
    // ─────────────────────────────────────────────────────────────────────────────
    function loadExport() {
        const tables = [
            { name: 'Users', icon: '👥' },
            { name: 'Products', icon: '🧴' },
            { name: 'Ingredients', icon: '🧪' },
            { name: 'Reviews', icon: '⭐' },
            { name: 'Recommendations', icon: '💡' },
            { name: 'Product_Ingredients', icon: '🔗' }
        ];
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md">
                <h2 class="font-serif text-xl font-bold text-gray-800 mb-2">Export Data as CSV</h2>
                <p class="text-sm text-gray-500 mb-6">Download any table as a CSV file for reporting or backup.</p>
                <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${tables.map(t => `
                        <a href="${API}/export/${t.name}" download
                            class="glass-card rounded-xl p-4 shadow-sm hover:shadow-md transition-all text-center block hover:scale-[1.02]">
                            <div class="text-3xl mb-2">${t.icon}</div>
                            <p class="font-medium text-gray-800">${t.name.replace('_', ' ')}</p>
                            <p class="text-xs text-rose-500 mt-1">Download CSV</p>
                        </a>`).join('')}
                </div>
            </div>`;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // SETTINGS
    // ─────────────────────────────────────────────────────────────────────────────
    function loadSettings() {
        document.getElementById('tabContent').innerHTML = `
            <div class="glass-card rounded-2xl p-6 shadow-md max-w-md">
                <h2 class="font-serif text-xl font-bold text-gray-800 mb-4">🔑 Change Admin Password</h2>
                <form id="pwForm" class="space-y-3">
                    <div>
                        <label class="text-sm text-gray-600">Current Password</label>
                        <input name="currentPassword" type="password" required
                            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">New Password (min 6 chars)</label>
                        <input name="newPassword" type="password" required minlength="6"
                            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm mt-1">
                    </div>
                    <p id="pwMsg" class="text-sm hidden"></p>
                    <button type="submit"
                        class="w-full py-2 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-medium rounded-xl text-sm">
                        Update Password
                    </button>
                </form>
            </div>`;
        document.getElementById('pwForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Updating…';
            // Backend accepts both camelCase and snake_case; send camelCase as-is
            const body = Object.fromEntries(new FormData(e.target));
            const d = await api(`${API}/change-password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const msg = document.getElementById('pwMsg');
            msg.classList.remove('hidden', 'text-green-500', 'text-red-500');
            msg.classList.add(d.success ? 'text-green-500' : 'text-red-500');
            msg.textContent = d.message;
            btn.disabled = false; btn.textContent = 'Update Password';
            if (d.success) e.target.reset();
        });
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Utility: HTML escape to prevent XSS in injected values
    // ─────────────────────────────────────────────────────────────────────────────
    function escHtml(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Tab router
    // ─────────────────────────────────────────────────────────────────────────────
    function loadTab(tab) {
        switch (tab) {
            case 'dashboard':       loadDashboard();       break;
            case 'users':           loadUsers();           break;
            case 'products':        loadProducts();        break;
            case 'ingredients':     loadIngredients();     break;
            case 'reviews':         loadReviews();         break;
            case 'recommendations': loadRecommendations(); break;
            case 'reports':         loadReports();         break;
            case 'export':          loadExport();          break;
            case 'settings':        loadSettings();        break;
        }
    }

    loadTab('dashboard');
    </script>
</body>
