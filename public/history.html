<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Skin Analyser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #fdf2f8 0%, #fff1f2 50%, #fdf2f8 100%); }
        .glass-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .analysis-content h2 { font-size: 1.35rem; font-weight: 700; color: #1f2937; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .analysis-content h3 { font-size: 1.05rem; font-weight: 600; color: #374151; margin-top: 1rem; margin-bottom: 0.4rem; }
        .analysis-content p { color: #4b5563; line-height: 1.7; margin-bottom: 0.4rem; }
        .analysis-content ul, .analysis-content ol { margin-left: 1.5rem; margin-bottom: 0.5rem; color: #4b5563; }
        .analysis-content li { margin-bottom: 0.25rem; line-height: 1.6; }
        .analysis-content strong { color: #1f2937; }
        .analysis-content a { color: #e11d48; text-decoration: underline; }
        .analysis-content a:hover { color: #be123c; }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="glass-card sticky top-0 z-50 border-b border-white/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-rose-400 to-pink-500 rounded-xl flex items-center justify-center shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </div>
                    <span class="font-serif text-xl font-bold text-gray-800">Skin Analyser</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/dashboard" class="text-gray-600 hover:text-rose-500 font-medium text-sm transition-colors">Dashboard</a>
                    <a href="/analyze" class="text-gray-600 hover:text-rose-500 font-medium text-sm transition-colors">Analyze</a>
                    <a href="/history" class="text-rose-500 font-medium text-sm">History</a>
                    <div class="w-px h-6 bg-gray-200"></div>
                    <a href="/logout" class="text-sm text-gray-500 hover:text-rose-500 transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="font-serif text-3xl font-bold text-gray-800">Analysis History</h1>
                <p class="text-gray-500 mt-1">Your past skin analyses and recommendations</p>
            </div>
            <a href="/analyze" class="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-xl shadow-md hover:shadow-lg transition-all text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Analysis
            </a>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-16">
            <div class="w-10 h-10 border-3 border-rose-200 border-t-rose-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-500">Loading history...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16 glass-card rounded-3xl">
            <div class="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-rose-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-700 mb-2">No analyses yet</h3>
            <p class="text-gray-500 mb-4">Start by uploading a skin image for analysis</p>
            <a href="/analyze" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-xl shadow-md text-sm font-medium">
                Get Started
            </a>
        </div>

        <!-- History List -->
        <div id="historyList" class="hidden space-y-6"></div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                document.getElementById('loading').classList.add('hidden');

                if (!data.success || data.history.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }

                const container = document.getElementById('historyList');
                container.classList.remove('hidden');

                data.history.forEach((item, index) => {
                    const date = new Date(item.created_at).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl shadow-lg shadow-rose-50 overflow-hidden';
                    card.innerHTML = `
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex items-center gap-4">
                                    <img src="/uploads/${item.image_path}" alt="Skin analysis" class="w-20 h-20 rounded-xl object-cover shadow-md">
                                    <div>
                                        <h3 class="font-semibold text-gray-800">Analysis #${data.history.length - index}</h3>
                                        <p class="text-sm text-gray-500">${date}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="toggleDetails(${item.id})" class="px-3 py-1.5 bg-rose-50 text-rose-500 rounded-lg text-sm font-medium hover:bg-rose-100 transition-colors">
                                        <span id="toggleBtn-${item.id}">Show Details</span>
                                    </button>
                                    <button onclick="deleteEntry(${item.id}, this)" class="p-1.5 text-gray-400 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div id="details-${item.id}" class="hidden mt-4 pt-4 border-t border-gray-100">
                                <div class="analysis-content">${marked.parse(item.analysis_result)}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);

                    // Make links in this card open in new tab
                    card.querySelectorAll('.analysis-content a').forEach(a => {
                        a.setAttribute('target', '_blank');
                        a.setAttribute('rel', 'noopener noreferrer');
                    });
                });
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function toggleDetails(id) {
            const details = document.getElementById(`details-${id}`);
            const btn = document.getElementById(`toggleBtn-${id}`);
            details.classList.toggle('hidden');
            btn.textContent = details.classList.contains('hidden') ? 'Show Details' : 'Hide Details';
        }

        async function deleteEntry(id, btn) {
            if (!confirm('Delete this analysis?')) return;
            try {
                await fetch(`/api/history/${id}`, { method: 'DELETE' });
                btn.closest('.glass-card').remove();
                // Check if list is now empty
                if (document.getElementById('historyList').children.length === 0) {
                    document.getElementById('historyList').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (err) {
                alert('Failed to delete. Try again.');
            }
        }

        loadHistory();
    </script>
</body>
</html>
