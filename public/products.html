<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Skin Analyser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 25%, #fff1f2 50%, #f0fdf4 75%, #fdf2f8 100%); }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        .star { color: #fbbf24; }
        .filter-btn.active { background: linear-gradient(to right, #f43f5e, #ec4899); color: white !important; }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="glass-card sticky top-0 z-50 border-b border-white/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <a href="/" class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-gradient-to-br from-rose-400 to-pink-500 rounded-xl flex items-center justify-center shadow-md">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                        </div>
                        <span class="font-serif text-xl font-bold text-gray-800">Skin Analyser</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/" class="text-gray-600 hover:text-rose-500 font-medium text-sm transition-colors">Home</a>
                    <a href="/products" class="text-rose-500 font-medium text-sm">Products</a>
                    <div id="authLinks"><a href="/login" class="text-gray-600 hover:text-rose-500 font-medium text-sm transition-colors">Login</a></div>
                    <div id="userLinks" class="hidden flex items-center gap-3">
                        <a href="/dashboard" class="text-gray-600 hover:text-rose-500 font-medium text-sm transition-colors">Dashboard</a>
                        <a href="/logout" class="text-sm text-gray-500 hover:text-rose-500 transition-colors">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="font-serif text-3xl font-bold text-gray-800">Products</h1>
                <p class="text-gray-500 mt-1" id="resultCount">Loading products...</p>
            </div>
            <!-- Search -->
            <div class="relative w-full sm:w-72">
                <input type="text" id="searchInput" placeholder="Search products..."
                    class="w-full px-4 py-2.5 pl-10 rounded-xl border border-gray-200 bg-white/80 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-100 text-sm">
                <svg class="w-4 h-4 text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar Filters -->
            <aside class="lg:w-64 flex-shrink-0">
                <div class="glass-card rounded-2xl p-6 shadow-md space-y-6">
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 text-sm uppercase tracking-wider">Category</h3>
                        <div class="space-y-2" id="categoryFilters">
                            <button data-category="" class="filter-btn active w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all">All Categories</button>
                            <button data-category="Cleanser" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">Cleanser</button>
                            <button data-category="Moisturizer" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">Moisturizer</button>
                            <button data-category="Sunscreen" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">Sunscreen</button>
                            <button data-category="Serum" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">Serum</button>
                            <button data-category="Toner" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">Toner</button>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 text-sm uppercase tracking-wider">Price Range</h3>
                        <div class="flex items-center gap-2">
                            <input type="number" id="priceMin" placeholder="Min" min="0" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none">
                            <span class="text-gray-400">-</span>
                            <input type="number" id="priceMax" placeholder="Max" min="0" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none">
                        </div>
                        <button id="applyPrice" class="mt-2 w-full px-3 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">Apply</button>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 text-sm uppercase tracking-wider">Sort By</h3>
                        <select id="sortSelect" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-rose-300 focus:outline-none">
                            <option value="name_asc">Name (A-Z)</option>
                            <option value="name_desc">Name (Z-A)</option>
                            <option value="price_asc">Price (Low to High)</option>
                            <option value="price_desc">Price (High to Low)</option>
                            <option value="rating">Highest Rated</option>
                            <option value="reviews">Most Reviewed</option>
                        </select>
                    </div>
                    <button id="clearFilters" class="w-full px-3 py-2 text-rose-500 text-sm font-medium rounded-lg border border-rose-200 hover:bg-rose-50 transition-colors">Clear All Filters</button>
                </div>
            </aside>

            <!-- Products Grid -->
            <div class="flex-1">
                <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-5" id="productsGrid">
                    <div class="text-center py-16 col-span-3 text-gray-400">Loading products...</div>
                </div>
                <!-- Pagination -->
                <div class="flex items-center justify-center gap-2 mt-8" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let filters = { category: '', search: '', priceMin: '', priceMax: '', sort: 'name_asc' };

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('category')) filters.category = urlParams.get('category');
        if (urlParams.get('search')) { filters.search = urlParams.get('search'); document.getElementById('searchInput').value = filters.search; }
        if (urlParams.get('sort')) { filters.sort = urlParams.get('sort'); document.getElementById('sortSelect').value = filters.sort; }

        // Highlight active category
        function updateCategoryUI() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === filters.category) btn.classList.add('active');
            });
        }
        updateCategoryUI();

        // Auth check
        fetch('/api/user').then(r => r.json()).then(d => {
            if (d.success) {
                document.getElementById('authLinks').classList.add('hidden');
                document.getElementById('userLinks').classList.remove('hidden');
                document.getElementById('userLinks').classList.add('flex');
            }
        }).catch(() => {});

        // Fetch products
        async function loadProducts() {
            const params = new URLSearchParams();
            params.set('page', currentPage);
            params.set('limit', '12');
            if (filters.category) params.set('category', filters.category);
            if (filters.search) params.set('search', filters.search);
            if (filters.priceMin) params.set('min_price', filters.priceMin);
            if (filters.priceMax) params.set('max_price', filters.priceMax);
            if (filters.sort) params.set('sort', filters.sort);

            try {
                const res = await fetch('/api/products?' + params.toString());
                const data = await res.json();
                if (!data.success) return;

                document.getElementById('resultCount').textContent = `${data.pagination.total} product${data.pagination.total !== 1 ? 's' : ''} found`;

                const grid = document.getElementById('productsGrid');
                if (data.products.length === 0) {
                    grid.innerHTML = `<div class="text-center py-16 col-span-3">
                        <div class="text-5xl mb-4">🔍</div>
                        <p class="text-gray-500 font-medium">No products found</p>
                        <p class="text-gray-400 text-sm mt-1">Try adjusting your filters</p>
                    </div>`;
                } else {
                    grid.innerHTML = data.products.map(p => `
                        <a href="/products/${p.product_id}" class="product-card glass-card rounded-2xl p-5 shadow-md transition-all duration-300 block">
                            <div class="flex items-start justify-between mb-3">
                                <span class="px-2.5 py-1 bg-rose-50 text-rose-600 text-xs font-medium rounded-lg">${p.category}</span>
                                ${p.expiry_date && new Date(p.expiry_date) < new Date() ? '<span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs font-medium rounded-lg">Expired</span>' : ''}
                            </div>
                            <h3 class="font-semibold text-gray-800 mb-1 text-lg">${p.product_name}</h3>
                            <p class="text-sm text-gray-500 mb-3">${p.brand}</p>
                            <div class="flex items-center gap-2 mb-3">
                                <div class="flex text-sm">
                                    ${'<span class="star">★</span>'.repeat(Math.round(p.avg_rating || 0))}${'<span class="text-gray-300">★</span>'.repeat(5 - Math.round(p.avg_rating || 0))}
                                </div>
                                <span class="text-xs text-gray-400">${p.avg_rating ? parseFloat(p.avg_rating).toFixed(1) : 'N/A'} (${p.review_count || 0})</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <p class="text-xl font-bold text-rose-500">₹${p.price ? parseFloat(p.price).toFixed(2) : '0.00'}</p>
                                <span class="text-xs text-gray-400">Category: ${p.category || 'Unknown'}</span>
                            </div>
                        </a>
                    `).join('');
                }

                // Pagination
                renderPagination(data.pagination.page, data.pagination.pages);
            } catch (err) {
                console.error(err);
            }
        }

        function renderPagination(current, total) {
            const container = document.getElementById('pagination');
            if (total <= 1) { container.innerHTML = ''; return; }
            let html = '';
            if (current > 1) html += `<button onclick="goPage(${current - 1})" class="px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-sm text-gray-600 hover:border-rose-300">← Prev</button>`;
            for (let i = 1; i <= total; i++) {
                if (i === current) {
                    html += `<button class="px-3 py-1.5 rounded-lg bg-gradient-to-r from-rose-500 to-pink-500 text-white text-sm font-medium">${i}</button>`;
                } else if (i === 1 || i === total || Math.abs(i - current) <= 2) {
                    html += `<button onclick="goPage(${i})" class="px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-sm text-gray-600 hover:border-rose-300">${i}</button>`;
                } else if (Math.abs(i - current) === 3) {
                    html += `<span class="text-gray-400">...</span>`;
                }
            }
            if (current < total) html += `<button onclick="goPage(${current + 1})" class="px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-sm text-gray-600 hover:border-rose-300">Next →</button>`;
            container.innerHTML = html;
        }

        function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                filters.category = btn.dataset.category;
                currentPage = 1;
                updateCategoryUI();
                loadProducts();
            });
        });

        document.getElementById('sortSelect').addEventListener('change', e => {
            filters.sort = e.target.value;
            currentPage = 1;
            loadProducts();
        });

        document.getElementById('applyPrice').addEventListener('click', () => {
            filters.priceMin = document.getElementById('priceMin').value;
            filters.priceMax = document.getElementById('priceMax').value;
            currentPage = 1;
            loadProducts();
        });

        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                filters.search = e.target.value.trim();
                currentPage = 1;
                loadProducts();
            }, 400);
        });

        document.getElementById('clearFilters').addEventListener('click', () => {
            filters = { category: '', search: '', priceMin: '', priceMax: '', sort: 'name_asc' };
            document.getElementById('searchInput').value = '';
            document.getElementById('priceMin').value = '';
            document.getElementById('priceMax').value = '';
            document.getElementById('sortSelect').value = 'name_asc';
            currentPage = 1;
            updateCategoryUI();
            loadProducts();
        });

        loadProducts();
    </script>
</body>
</html>
