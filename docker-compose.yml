services:

  # ── MySQL Database ────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: skin_analyser_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: skin_analyser
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node.js App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin_analyser_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: skin_analyser
      SESSION_SECRET: ${SESSION_SECRET:-skin-analyser-super-secret-2026}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  db_data:
  uploads_data:
